version: '3.8'

services:
  web:
    build: .
    container_name: motsmaux_web
    restart: always
    volumes:
      - .:/app
    ports:
      - "5000:5000"
    env_file:
      - .env  # Lit toutes les variables de connexion DB et Mail
    depends_on:
      - db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  db:
    image: postgres:15-alpine
    container_name: motmaux_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME_DEV}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5433:5432"

volumes:
  postgres_data: